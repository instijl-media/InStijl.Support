media:
  input: static/img/products
  output: /img/products

content:
  # ─── Apps (EN) ────────────────────────────────────────────────────────────

  - name: apps_en
    label: Apps (EN)
    type: collection
    path: content/apps
    match: "*/index.mdx"
    filename: "{title}/index.mdx"
    view:
      fields: [title, platform, status]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: type
        label: Type
        type: string
        hidden: true
      - name: platform
        label: Platform
        type: select
        options:
          values:
            - name: lightspeed
              label: Lightspeed
            - name: shopify
              label: Shopify
            - name: both
              label: Both
      - name: status
        label: Status
        type: select
        options:
          values:
            - name: active
              label: Active
            - name: beta
              label: Beta
            - name: deprecated
              label: Deprecated
      - name: summary
        label: Summary
        type: text
        required: true
      - name: logo
        label: Logo
        type: image
      - name: order
        label: Sort order
        type: number
      - name: pricing
        label: Pricing
        type: object
        fields:
          - name: plan
            label: Plan
            type: string
          - name: price
            label: Price
            type: string
          - name: interval
            label: Interval
            type: select
            options:
              values:
                - name: month
                  label: Per month
                - name: year
                  label: Per year
                - name: one-time
                  label: One-time
          - name: currency
            label: Currency
            type: select
            options:
              values:
                - name: EUR
                  label: EUR
                - name: USD
                  label: USD
                - name: GBP
                  label: GBP
      - name: links
        label: External links
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
          - name: url
            label: URL
            type: string
      - name: body
        label: Content
        type: rich-text

  - name: apps_en_subpages
    label: "Apps · subpages (EN)"
    type: collection
    path: content/apps
    match: "*/*.mdx"
    exclude:
      - "*/index.mdx"
    operations:
      create: false
    view:
      fields: [title]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: sidebar_position
        label: Sidebar position
        type: number
      - name: body
        label: Content
        type: rich-text

