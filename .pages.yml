media:
  input: static/img/products
  output: /img/products

# ─── Reusable field definitions ───────────────────────────────────────────────
# YAML anchors — referenced below with *overview-fields / *subpage-fields.
# To add a new app or theme, copy one of the existing product groups, update
# the name/label/path values, and leave `fields: *overview-fields` as-is.

x-overview-fields: &overview-fields
  - { name: folder,    label: "Folder (URL slug, e.g. InStijlAI)", type: string, required: true }
  - { name: title,      label: "Title (EN)",    type: string, required: true }
  - { name: nl_title,   label: "Title (NL)",    type: string, required: true }
  - { name: summary,    label: "Summary (EN)",  type: text,   required: true }
  - { name: nl_summary, label: "Summary (NL)",  type: text,   required: true }
  - name: platform
    label: Platform
    type: select
    options:
      values:
        - { name: lightspeed, label: Lightspeed }
        - { name: shopify,    label: Shopify }
        - { name: both,       label: Both }
  - name: status
    label: Status
    type: select
    options:
      values:
        - { name: active,     label: Active }
        - { name: beta,       label: Beta }
        - { name: deprecated, label: Deprecated }
  - { name: logo,    label: Logo,         type: image }
  - { name: order,   label: "Sort order", type: number }
  - { name: type,    label: Type,         type: string, hidden: true }
  - { name: body,    label: "Content (EN)", type: rich-text }
  - { name: nl_body, label: "Content (NL)", type: rich-text }

x-subpage-fields: &subpage-fields
  - { name: folder,          label: "Product folder (slug, e.g. InStijlAI)", type: string, required: true }
  - { name: title,            label: "Title (EN)",       type: string, required: true }
  - { name: nl_title,         label: "Title (NL)",       type: string, required: true }
  - { name: sidebar_position, label: "Sidebar position", type: number }
  - { name: body,             label: "Content (EN)",     type: rich-text }
  - { name: nl_body,          label: "Content (NL)",     type: rich-text }

content:

  # ═══════════════════════════════════════════════════════════════════════════
  # APPS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: apps
    label: Apps
    type: group
    items:

      # All overviews in one collection — add a new app by clicking "Add entry"
      - name: app_overviews
        label: Overviews
        type: collection
        path: content/apps
        match: "*/index.mdx"
        filename: "{folder}/index.mdx"
        fields: *overview-fields

      # All subpages in one collection — fill in "folder" to scope the file
      - name: app_subpages
        label: Subpages
        type: collection
        path: content/apps
        match: "*/*.mdx"
        exclude: ["*/index.mdx"]
        filename: "{folder}/{title}.mdx"
        fields: *subpage-fields

  # ═══════════════════════════════════════════════════════════════════════════
  # THEMES
  # ═══════════════════════════════════════════════════════════════════════════
  - name: themes
    label: Themes
    type: group
    items:

      # All overviews in one collection — add a new theme by clicking "Add entry"
      - name: theme_overviews
        label: Overviews
        type: collection
        path: content/themes
        match: "*/index.mdx"
        filename: "{folder}/index.mdx"
        fields: *overview-fields

      # All subpages in one collection — fill in "folder" to scope the file
      - name: theme_subpages
        label: Subpages
        type: collection
        path: content/themes
        match: "*/*.mdx"
        exclude: ["*/index.mdx"]
        filename: "{folder}/{title}.mdx"
        fields: *subpage-fields
