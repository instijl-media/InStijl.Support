      - { name: summary,  label: Summary (one sentence),  type: text, required: true }
      - { name: logo,     label: Logo,    type: image }
      - { name: cover,    label: "Cover image (16:9)", type: image }
      - { name: order,    label: "Sort order", type: number }
      - name: pricing
        label: Pricing
        type: object
        fields:
          - { name: plan,     label: Plan,     type: string }
          - { name: price,    label: Price,    type: string }
          - name: interval
            label: Interval
            type: select
            options: [month, year, one-time]
          - name: currency
            label: Currency
            type: select
