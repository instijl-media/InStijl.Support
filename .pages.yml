# PagesCMS configuration for instijl.support
# Docs: https://pagescms.org/docs/configuration

media:
  input: static/img/products
  output: /img/products

content:
  ##############################################################################
  # Apps — English (source content)
  ##############################################################################
  - name: apps_en
    label: "Apps (EN)"
    type: collection
    path: content/apps
    filename: "{fields.slug}/index.mdx"
    view:
      fields: [title, platform, status]
    fields:
      - { name: title,    label: Title,    type: string, required: true }
      - name: slug
        label: "URL slug (folder name)"
        type: string
        required: true
        pattern: "^[a-z0-9-]+$"
        description: "Lowercase letters, numbers and hyphens only. Determines the URL."
      - name: type
        label: Type
        type: select
        required: true
        options: [app, theme]
        default: app
        hidden: true
      - name: platform
        label: Platform
        type: select
        required: true
        options:
          - { label: Lightspeed, value: lightspeed }
          - { label: Shopify,    value: shopify }
          - { label: Both,       value: both }
      - name: status
        label: Status
        type: select
        required: true
        options:
          - { label: Active,     value: active }
          - { label: Beta,       value: beta }
          - { label: Deprecated, value: deprecated }
        default: active
      - { name: summary,  label: Summary (one sentence),  type: text, required: true }
      - { name: logo,     label: Logo,    type: image }
      - { name: cover,    label: "Cover image (16:9)", type: image }
      - { name: order,    label: "Sort order", type: number }
      - name: pricing
        label: Pricing
        type: object
        fields:
          - { name: plan,     label: Plan,     type: string }
          - { name: price,    label: Price,    type: string }
          - name: interval
            label: Interval
            type: select
            options: [month, year, one-time]
          - name: currency
            label: Currency
            type: select
            options: [EUR, USD, GBP]
      - name: links
        label: "External links"
        type: list
        fields:
          - { name: label, label: Label, type: string, required: true }
          - { name: url,   label: URL,   type: string, required: true }
      - { name: body, label: Content, type: rich-text }

  - name: apps_en_pages
    label: "Apps · subpages (EN)"
    type: collection
    path: content/apps
    match: "*/*.mdx"
    exclude: "*/index.mdx"
    view:
      fields: [title]
    fields:
      - { name: title,            label: Title,             type: string, required: true }
      - { name: sidebar_position, label: "Sidebar position", type: number }
      - { name: body,             label: Content,            type: rich-text }

  ##############################################################################
  # Themes — English (source content)
  ##############################################################################
