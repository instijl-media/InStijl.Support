media:
  input: static/img/products
  output: /img/products

content:

  # ═══════════════════════════════════════════════════════════════════════════
  # APPS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: apps
    label: Apps
    type: group
    items:

      # ── AI ────────────────────────────────────────────────────────────────
      - name: app_ai
        label: AI
        type: group
        items:
          - name: app_ai_en
            label: "Overview (EN)"
            type: file
            path: content/apps/ai/index.mdx
            fields:
              - { name: title,    label: Title,    type: string, required: true }
              - { name: type,     label: Type,     type: string, hidden: true }
              - name: platform
                label: Platform
                type: select
                options:
                  values:
                    - { name: lightspeed, label: Lightspeed }
                    - { name: shopify,    label: Shopify }
                    - { name: both,       label: Both }
              - name: status
                label: Status
                type: select
                options:
                  values:
                    - { name: active,     label: Active }
                    - { name: beta,       label: Beta }
                    - { name: deprecated, label: Deprecated }
              - { name: summary, label: Summary, type: text, required: true }
              - { name: logo,    label: Logo,    type: image }
              - { name: order,   label: "Sort order", type: number }
              - name: pricing
                label: Pricing
                type: object
                fields:
                  - { name: plan,     label: Plan,     type: string }
                  - { name: price,    label: Price,    type: string }
                  - name: interval
                    label: Interval
                    type: select
                    options:
                      values:
                        - { name: month,    label: Per month }
                        - { name: year,     label: Per year }
                        - { name: one-time, label: One-time }
                  - name: currency
                    label: Currency
                    type: select
                    options:
                      values:
                        - { name: EUR, label: EUR }
                        - { name: USD, label: USD }
                        - { name: GBP, label: GBP }
              - name: links
                label: "External links"
                type: object
                list: true
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: url,   label: URL,   type: string }
              - { name: body, label: Content, type: rich-text }

          - name: app_ai_pages_en
            label: "Subpages (EN)"
            type: collection
            path: content/apps/ai
            match: "*.mdx"
            exclude: ["index.mdx"]
            filename: "{title}.mdx"
            fields:
              - { name: title,            label: Title,             type: string, required: true }
              - { name: sidebar_position, label: "Sidebar position", type: number }
              - { name: body,             label: Content,            type: rich-text }

          - name: app_ai_nl
            label: "Overview (NL)"
            type: file
            path: i18n/nl/docusaurus-plugin-content-docs-apps/current/ai/index.mdx
            fields:
              - { name: title,   label: Title,   type: string, required: true }
              - { name: summary, label: Summary, type: text,   required: true }
              - { name: body,    label: Content, type: rich-text }

          - name: app_ai_pages_nl
            label: "Subpages (NL)"
            type: collection
            path: i18n/nl/docusaurus-plugin-content-docs-apps/current/ai
            match: "*.mdx"
            exclude: ["index.mdx"]
            filename: "{title}.mdx"
            fields:
              - { name: title, label: Title,   type: string, required: true }
              - { name: body,  label: Content, type: rich-text }

      # ── Sync ──────────────────────────────────────────────────────────────
      - name: app_sync
        label: Sync
        type: group
        items:
          - name: app_sync_en
            label: "Overview (EN)"
            type: file
            path: content/apps/sync/index.mdx
            fields:
              - { name: title,    label: Title,    type: string, required: true }
              - { name: type,     label: Type,     type: string, hidden: true }
              - name: platform
                label: Platform
                type: select
                options:
                  values:
                    - { name: lightspeed, label: Lightspeed }
                    - { name: shopify,    label: Shopify }
                    - { name: both,       label: Both }
              - name: status
                label: Status
                type: select
                options:
                  values:
                    - { name: active,     label: Active }
                    - { name: beta,       label: Beta }
                    - { name: deprecated, label: Deprecated }
              - { name: summary, label: Summary, type: text, required: true }
              - { name: logo,    label: Logo,    type: image }
              - { name: order,   label: "Sort order", type: number }
              - name: pricing
                label: Pricing
                type: object
                fields:
                  - { name: plan,     label: Plan,  type: string }
                  - { name: price,    label: Price, type: string }
                  - name: interval
                    label: Interval
                    type: select
                    options:
                      values:
                        - { name: month,    label: Per month }
                        - { name: year,     label: Per year }
                        - { name: one-time, label: One-time }
                  - name: currency
                    label: Currency
                    type: select
                    options:
                      values:
                        - { name: EUR, label: EUR }
                        - { name: USD, label: USD }
                        - { name: GBP, label: GBP }
              - name: links
                label: "External links"
                type: object
                list: true
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: url,   label: URL,   type: string }
              - { name: body, label: Content, type: rich-text }

          - name: app_sync_pages_en
            label: "Subpages (EN)"
            type: collection
            path: content/apps/sync
            match: "*.mdx"
            exclude: ["index.mdx"]
            filename: "{title}.mdx"
            fields:
              - { name: title,            label: Title,             type: string, required: true }
              - { name: sidebar_position, label: "Sidebar position", type: number }
              - { name: body,             label: Content,            type: rich-text }

          - name: app_sync_nl
            label: "Overview (NL)"
            type: file
            path: i18n/nl/docusaurus-plugin-content-docs-apps/current/sync/index.mdx
            fields:
              - { name: title,   label: Title,   type: string, required: true }
              - { name: summary, label: Summary, type: text,   required: true }
              - { name: body,    label: Content, type: rich-text }

          - name: app_sync_pages_nl
            label: "Subpages (NL)"
            type: collection
            path: i18n/nl/docusaurus-plugin-content-docs-apps/current/sync
            match: "*.mdx"
            exclude: ["index.mdx"]
            filename: "{title}.mdx"
            fields:
              - { name: title, label: Title,   type: string, required: true }
              - { name: body,  label: Content, type: rich-text }

