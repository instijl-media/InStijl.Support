media:
  input: static/img/products
  output: /img/products

# ─── Reusable field definitions ───────────────────────────────────────────────
# YAML anchors — referenced below with *overview-fields / *subpage-fields.
# To add a new app or theme, copy one of the existing product groups, update
# the name/label/path values, and leave `fields: *overview-fields` as-is.

x-overview-fields: &overview-fields
  - { name: title,      label: "Title (EN)",    type: string, required: true }
  - { name: nl_title,   label: "Title (NL)",    type: string, required: true }
  - { name: summary,    label: "Summary (EN)",  type: text,   required: true }
  - { name: nl_summary, label: "Summary (NL)",  type: text,   required: true }
  - name: platform
    label: Platform
    type: select
    options:
      values:
        - { name: lightspeed, label: Lightspeed }
        - { name: shopify,    label: Shopify }
        - { name: both,       label: Both }
  - name: status
    label: Status
    type: select
    options:
      values:
        - { name: active,     label: Active }
        - { name: beta,       label: Beta }
        - { name: deprecated, label: Deprecated }
  - { name: logo,    label: Logo,         type: image }
  - { name: order,   label: "Sort order", type: number }
  - { name: sidebar_position, label: "Sidebar position", type: number, default: 0 }
  - { name: type,    label: Type,         type: string, hidden: true }
  - { name: body,    label: "Content (EN)", type: rich-text }
  - { name: nl_body, label: "Content (NL)", type: rich-text }
  - name: embeds
    label: "HTML Embeds"
    type: list
    fields:
      - { name: id,   label: "Shortcode ID (e.g. video1)", type: string, required: true }
      - { name: html, label: "HTML / embed code",          type: code,   lang: html }

x-subpage-fields: &subpage-fields
  - { name: folder,          label: "Product folder (slug, e.g. InStijlAI)", type: string }
  - { name: title,            label: "Title (EN)",       type: string, required: true }
  - { name: nl_title,         label: "Title (NL)",       type: string, required: true }
  - { name: sidebar_position, label: "Sidebar position", type: number }
  - { name: body,             label: "Content (EN)",     type: rich-text }
  - { name: nl_body,          label: "Content (NL)",     type: rich-text }
  - name: embeds
    label: "HTML Embeds"
    type: list
    fields:
      - { name: id,   label: "Shortcode ID (e.g. video1)", type: string, required: true }
      - { name: html, label: "HTML / embed code",          type: code,   lang: html }

content:

  # ═══════════════════════════════════════════════════════════════════════════
  # APPS
  # To add a new app: create the folder + index.mdx manually, then add a
  # `file` entry here pointing to it. Subpages need no changes here.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: apps
    label: Apps
    type: group
    items:

      # ── Overviews (one file entry per app) ────────────────────────────────
      - name: app_ai_overview
        label: "InStijl AI"
        type: file
        path: content/apps/InStijlAI/index.mdx
        fields: *overview-fields

      - name: app_postcode_check_overview
        label: "Postcode Check"
        type: file
        path: content/apps/instijl-postcode-check/index.mdx
        fields: *overview-fields

      - name: app_shop_review_block_overview
        label: "Shop Review Block"
        type: file
        path: content/apps/instijl-shop-review-block/index.mdx
        fields: *overview-fields

      # ── Subpages (all apps, add freely) ───────────────────────────────────
      - name: app_subpages
        label: Subpages
        type: collection
        path: content/apps
        match: "*/*.mdx"
        exclude: ["index.mdx"]
        filename: "{folder}/{title}.mdx"
        fields: *subpage-fields

  # ═══════════════════════════════════════════════════════════════════════════
  # THEMES
  # To add a new theme: create the folder + index.mdx manually, then add a
  # `file` entry here pointing to it. Subpages need no changes here.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: themes
    label: Themes
    type: group
    items:

      # ── Overviews (one file entry per theme) ──────────────────────────────
      - name: theme_inspire_overview
        label: "Inspire"
        type: file
        path: content/themes/inspire/index.mdx
        fields: *overview-fields

      - name: theme_unity_overview
        label: "Unity"
        type: file
        path: content/themes/unity/index.mdx
        fields: *overview-fields

      # ── Subpages (all themes, add freely) ─────────────────────────────────
      - name: theme_subpages
        label: Subpages
        type: collection
        path: content/themes
        match: "*/*.mdx"
        exclude: ["index.mdx"]
        filename: "{folder}/{title}.mdx"
        fields: *subpage-fields
